name: GKI-Duchamp Builder

on:
  workflow_call:
    inputs:
      TODO:
        type: string
      KSU:
        type: string
      KSU_SUSFS:
        type: string
      LAST_BUILD:
        type: string
      STATUS:
        type: string
      TEST:
        type: string
      LTO:
        type: string

  workflow_dispatch:
    inputs:
      TODO:
        description: To do
        default: "kernel"
        type: choice
        options:
          - "kernel"
          - "defconfig"

      STATUS:
        description: Run type
        default: "RELEASE"
        type: choice
        options:
          - "RELEASE"
          - "BETA"

      TEST:
        description: debug the pipeline
        default: "no"
        type: choice
        options:
          - "no"
          - "yes"

      LTO:
        description: enable LTO optimization
        default: "thinLTO"
        type: choice
        options:
          - "noneLTO"
          - "thinLTO"
          - "fullLTO"

      BUILD_VANILLA:
        description: "Build Vanilla (no KSU)"
        type: boolean
        default: true

      BUILD_KSU:
        description: "Build with KernelSU"
        type: boolean
        default: true

      BUILD_KSUN:
        description: "Build with KernelSU-Next"
        type: boolean
        default: true

      BUILD_SKSU:
        description: "Build with SukiSU-Ultra"
        type: boolean
        default: true

      BUILD_KSU_SUSFS:
        description: "Build with KernelSU and its forks (SukiSU Ultra, KernelSU Next) + SUSFS"
        type: boolean
        default: true

env:
  MAN_DISABLE: true
  DEBIAN_FRONTEND: noninteractive

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          # Build JSON array manually
          ENTRIES=""

          if [[ "${{ github.event.inputs.BUILD_VANILLA }}" == "true" ]]; then
            ENTRIES="${ENTRIES}{\"name\":\"Vanilla\",\"KSU\":\"no\",\"KSU_COMPAT\":\"false\",\"KSU_SUSFS\":\"false\"},"
          fi

          if [[ "${{ github.event.inputs.BUILD_KSU }}" == "true" ]]; then
            ENTRIES="${ENTRIES}{\"name\":\"KSU\",\"KSU\":\"KSU\",\"KSU_COMPAT\":\"false\",\"KSU_SUSFS\":\"false\"},"
          fi

          if [[ "${{ github.event.inputs.BUILD_KSUN }}" == "true" ]]; then
            ENTRIES="${ENTRIES}{\"name\":\"KSUN\",\"KSU\":\"KSUN\",\"KSU_COMPAT\":\"false\",\"KSU_SUSFS\":\"false\"},"
          fi

          if [[ "${{ github.event.inputs.BUILD_SKSU }}" == "true" ]]; then
            ENTRIES="${ENTRIES}{\"name\":\"SKSU\",\"KSU\":\"SKSU\",\"KSU_COMPAT\":\"false\",\"KSU_SUSFS\":\"false\"},"
          fi

          if [[ "${{ github.event.inputs.BUILD_KSU_SUSFS }}" == "true" ]]; then
            ENTRIES="${ENTRIES}{\"name\":\"KSU+SUSFS\",\"KSU\":\"KSU\",\"KSU_COMPAT\":\"false\",\"KSU_SUSFS\":\"true\"},"
            ENTRIES="${ENTRIES}{\"name\":\"KSUN+SUSFS\",\"KSU\":\"KSUN\",\"KSU_COMPAT\":\"false\",\"KSU_SUSFS\":\"true\"},"
            ENTRIES="${ENTRIES}{\"name\":\"Compat+KSU+SUSFS\",\"KSU\":\"KSU\",\"KSU_COMPAT\":\"true\",\"KSU_SUSFS\":\"true\"},"
            ENTRIES="${ENTRIES}{\"name\":\"Compat+KSUN+SUSFS\",\"KSU\":\"KSUN\",\"KSU_COMPAT\":\"true\",\"KSU_SUSFS\":\"true\"},"
            ENTRIES="${ENTRIES}{\"name\":\"SKSU+SUSFS\",\"KSU\":\"SKSU\",\"KSU_COMPAT\":\"false\",\"KSU_SUSFS\":\"true\"},"
            ENTRIES="${ENTRIES}{\"name\":\"RSKSU+SUSFS\",\"KSU\":\"RSKSU\",\"KSU_COMPAT\":\"false\",\"KSU_SUSFS\":\"true\"},"
          fi

          # Remove trailing comma and wrap in array
          ENTRIES="[${ENTRIES%,}]"

          # Output matrix
          echo "matrix={\"include\":${ENTRIES}}" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Validate Inputs and Secrets
        env:
          KSU: ${{ matrix.KSU }}
          KSU_SUSFS: ${{ matrix.KSU_SUSFS }}
          KERNEL_REPO: ${{ secrets.KERNEL_REPO }}
        run: |
          _error() {
              echo "❌ ERROR: $*"
              let ret++
          }

          ret=0

          if [[ $KSU == "no" && $KSU_SUSFS == "true" ]]; then
              _error "Cannot use SuSFS without KernelSU"
          fi

          if [[ $ret -gt 0 ]]; then
            exit $ret
          fi

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache gha bc bison flex libssl-dev libelf-dev dwarves cpio
          pip install lxml

      - name: Cache ccache
        uses: actions/cache@v4
        id: ccache-cache
        with:
          path: ~/.ccache
          key: ccache-${{ matrix.name }}-${{ github.run_id }}
          restore-keys: ccache-${{ matrix.name }}

      - name: Run Build Script
        env:
          GH_TOKEN: ${{ github.token }}
          KERNEL_REPO: https://github.com/ahmed-alnassif/GKI-Duchamp-6.1
          KSU: ${{ matrix.KSU }}
          KSU_COMPAT: ${{ matrix.KSU_COMPAT }}
          KSU_SUSFS: ${{ matrix.KSU_SUSFS }}
          LAST_BUILD: ${{ inputs.LAST_BUILD }}
          TODO: ${{ inputs.TODO }}
          STATUS: ${{ inputs.STATUS }}
          TEST: ${{ inputs.TEST }}
          LTO: ${{ inputs.LTO }}
          BUILD_NAME: ${{ matrix.name }}
          RUN_NUM: -r${{ github.run_number }}
        run: |
          export GIT_CLONE_PROTECTION_ACTIVE=false
          chmod +x *.sh py/*.py
          
          # Pehle tumhara normal kernel build hoga
          ./build.sh
          
          echo "🔥 Compiling GodMode Kernel Module..."
          
          # GKI out directory dhoondhna jahan kernel headers hain
          KERNEL_OUT_DIR=$(find $(pwd)/out -name "Module.symvers" -printf "%h\n" | head -n 1)
          
          if [ -z "$KERNEL_OUT_DIR" ]; then 
              echo "⚠️ Kernel output directory nahi mili! Module compile nahi hua."
          else
              echo "✅ Kernel directory mil gayi: $KERNEL_OUT_DIR"
              
              # GodMode module ko compile karna
              make -j$(nproc) -C $KERNEL_OUT_DIR M=$(pwd)/godmode_module ARCH=arm64 LLVM=1 LLVM_IAS=1 modules
              
              # Agar compile success hua, toh Zip banayenge
              if [ -f "godmode_module/godmode.ko" ]; then
                  echo "✅ godmode.ko successfully ban gaya!"
                  
                  # Flashable ZIP ka structure banana
                  mkdir -p GodMode_KSU
                  cp godmode_module/godmode.ko GodMode_KSU/
                  
                  # module.prop file generate karna (YAML Safe Approach)
                  echo "id=godmode_bypass" > GodMode_KSU/module.prop
                  echo "name=GodMode EAS Bypass (KSU)" >> GodMode_KSU/module.prop
                  echo "version=v1.0" >> GodMode_KSU/module.prop
                  echo "versionCode=1" >> GodMode_KSU/module.prop
                  echo "author=GodMode" >> GodMode_KSU/module.prop
                  echo "description=Bypasses MediaTek EAS and Thermal limits for extreme gaming." >> GodMode_KSU/module.prop
                  
                  # service.sh file generate karna (YAML Safe Approach)
                  echo "#!/system/bin/sh" > GodMode_KSU/service.sh
                  echo 'MODDIR=${0%/*}' >> GodMode_KSU/service.sh
                  echo "insmod \$MODDIR/godmode.ko" >> GodMode_KSU/service.sh
                  
                  chmod +x GodMode_KSU/service.sh
                  
                  # Sabko zip karke artifacts folder me dalna
                  cd GodMode_KSU
                  zip -r9 ../artifacts/GodMode-KSU-Module-${{ matrix.name }}.zip *
                  cd ..
                  echo "🎉 GodMode zip successfully created in artifacts!"
              else
                  echo "❌ Module compilation fail ho gaya!"
              fi
          fi
          
          

      - name: ccache stats
        if: always()
        run: |
          ccache --show-stats

      - name: Save environment for release
        if: always()
        run: |
          cat > build-env-${{ matrix.name }}.txt << EOF
          RELEASE_REPO=${{ env.RELEASE_REPO }}
          KERNEL_NAME=${{ env.KERNEL_NAME }}
          RELEASE_NAME=${{ env.RELEASE_NAME }}
          RELEASE=${{ env.RELEASE }}
          LINUX_VERSION=${{ env.LINUX_VERSION }}
          COMPILER_STRING=${{ env.COMPILER_STRING }}
          SUSFS_VERSION=${{ env.SUSFS_VERSION }}
          BASE_NAME=${{ env.BASE_NAME }}
          KSU=${{ matrix.KSU }}
          KSU_SUSFS=${{ matrix.KSU_SUSFS }}
          EOF

          echo "BUILD_VARIANT=${{ matrix.name }}" >> build-env-${{ matrix.name }}.txt
          echo "Saved environment for ${{ matrix.name }}"

      - name: Upload environment file
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-env-${{ matrix.name }}-${{ github.run_number }}
          path: build-env-${{ matrix.name }}.txt
          retention-days: 1

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.name }}-${{ github.run_number }}
          path: artifacts/
          retention-days: 1

  upload-all:
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts
          merge-multiple: true

      - name: Upload combined artifacts
        uses: actions/upload-artifact@v4
        with:
          name: all-builds-${{ github.run_number }}
          retention-days: 7
          path: |
            downloaded-artifacts/artifacts/*.txt
            downloaded-artifacts/artifacts/*.zip

  release:
    needs: build
    if: github.event.inputs.TODO != 'defconfig' && github.event.inputs.STATUS == 'RELEASE'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Generate Checksums
        run: |
          cd release-artifacts
          sha256sum *.zip > checksums.txt
          md5sum *.zip > checksums-md5.txt

      - name: Load environment from builds
        run: |
          # Find all environment files
          ENV_FILES=$(find release-artifacts -name "build-env-*.txt")

          # Set defaults
          echo "KSU=Not included" >> $GITHUB_ENV
          echo "KSU_SUSFS=Not included" >> $GITHUB_ENV
          echo "SUSFS_VERSION=Not included" >> $GITHUB_ENV

          # Load values from any file
          SUSFS_FILE=""
          for env_file in $ENV_FILES; do
            echo "Checking $env_file..."

            # Check if this file has SUSFS
            if grep -q "SUSFS_VERSION=" "$env_file" && grep -q "KSU_SUSFS=true" "$env_file"; then
              SUSFS_FILE="$env_file"
              echo "Found SUSFS build: $env_file"
              break
            fi
          done

          # If no SUSFS file, take first file
          if [ -z "$SUSFS_FILE" ]; then
            SUSFS_FILE=$(echo "$ENV_FILES" | head -1)
          fi

          # Load the chosen file
          if [ -f "$SUSFS_FILE" ]; then
            echo "Loading environment from: $SUSFS_FILE"
            while IFS='=' read -r key value; do
              if [ -n "$key" ] && [ -n "$value" ]; then
                echo "$key=$value" >> $GITHUB_ENV
              fi
            done < "$SUSFS_FILE"
          fi

      - name: Prepare release body
        run: |
            # Get list of built variants
            VARIANTS=$(ls release-artifacts/*.zip 2>/dev/null | xargs -n1 basename | sed 's/.zip//')

            {
            if [ "${{ inputs.TEST }}" = "yes"  ];then
              echo ">[!warning]"
              echo ">This is empty testing release don't download/install anything from here!"
              echo ""
            fi
            cat << EOF
            ### 📢 ${{ env.RELEASE_NAME }}

            **Build Information:**
            - 🐧 **Kernel:** ${{ env.RELEASE_NAME }}
            - 🔥 **LTO optimizations:** ${{ inputs.LTO }}
            - 🔖 **Version:** ${{ env.LINUX_VERSION }} (android14-6.1-lts)
            - 📦 **Variants:**
            $(echo "$VARIANTS" | sed 's/^/  - /')
            - 🛡️ **SuSFS:** ඞ ${{ env.SUSFS_VERSION }}
            - ⚙️ **Compiler:** ${{ env.COMPILER_STRING }}

            >[!Important]
            >- Got a bootloop? Switch to a Compat variant.

            **Performance & Efficiency Tweaks**
            Balanced optimizations for smoother UI, better multitasking & gaming on Poco X6 Pro (and similar **6.1.xx-android14** GKI kernel devices):

            - Timer frequency **HZ=300** → noticeably lower input lag & snappier feel
            - CPU governors: **schedutil** + **ondemand** → efficient & responsive scaling
            - Modern memory: **Multi-Gen LRU (MGLRU)** enabled → huge multitasking & battery win
            - zRAM: compressed swap with **LZ4** + **writeback** + tracking → more usable RAM in heavy use
            - I/O scheduler: **mq-deadline** as default → low-latency on fast UFS 4.0 storage
            - Networking: **TCP BBRv3** + **TCP Westwood+** + **FQ** + **ECN** + **IPv6 HL support** + **TCP_NODELAY forced** → better speed on WiFi/mobile data
            - IP Set full support + IPv6 NAT → better tethering & VPN performance
            - F2FS tuning: reduced GC sleep (50ms), enlarged fsync blocks, reduced congestion timeout → smoother I/O
            - ext4 commit age extended to 30s → fewer disk writes, better battery
            - Memory optimizations: faster memcpy, memcmp, memset (up to 50%) + 3x faster integer sqrt → lower CPU overhead
            - File struct 8-byte aligned + clear page 16-byte aligned → better cache performance
            - Freeze timeout reduced 20s→1s + wakelock cap 500ms + minimized alarm wakeup → less battery drain
            - Scheduler: efficient CPU scan order + DynamIQ cache buddy disabled + branch prediction hints → smarter core selection
            - Unicode filename validation → prevents crashes from invalid UTF-8 on vfat/exfat
            - Silenced IRQ & system log spam → cleaner dmesg, easier debugging
            - BBG (baseband-guard) a lightweight **LSM (Linux Security Module)** for the Android kernel, designed to block unauthorized writes to critical partitions/device nodes at the system level. This reduces the risk of malicious or accidental tampering with critical components such as the baseband and boot chain.

            >[!Tip]
            >Follow the next instructions to switch between Westwood+ and BBRv3

            To switch to westwood
            \`\`\`bash
            su -c "sysctl -w net.ipv4.tcp_congestion_control=westwood"
            \`\`\`
            To restore BBRv3
            \`\`\`bash
            su -c "sysctl -w net.ipv4.tcp_congestion_control=bbr"
            \`\`\`
            Test both and choose the suitable one for your network.

            ---
            **Android14-6.1-LTS Kernel Changelog (last 10 commits):**
            EOF
            echo ""
            if [ -f release-artifacts/android_kernel-6.1_changelog.txt ]; then
              cat release-artifacts/android_kernel-6.1_changelog.txt
            else
              echo "*No changelog available*"
            fi
            echo ""
            echo "**Full Commit History:** [Browse all commits](https://github.com/ahmed-alnassif/GKI-Duchamp-6.1/commits/GKID-6.1)"
            echo ""
            echo "---"
            echo "**KernelSU Changelog (last 10 commits):**"
            echo ""
            if [ -f release-artifacts/ksu_changelog.txt ]; then
              cat release-artifacts/ksu_changelog.txt
            else
              echo "*No changelog available*"
            fi
            echo ""
            echo "**Full Commit History:** [Browse all commits](https://github.com/tiann/KernelSU/commits/main)"
            echo ""
            echo "---"
            echo "**KernelSU Next Changelog (last 10 commits):**"
            echo ""
            if [ -f release-artifacts/ksun_changelog.txt ]; then
              cat release-artifacts/ksun_changelog.txt
            else
              echo "*No changelog available*"
            fi
            echo ""
            echo "**Full Commit History:** [Browse all commits](https://github.com/pershoot/KernelSU-Next/commits/dev-susfs)"
            echo ""
            echo "---"
            echo "**SukiSU Ultra Changelog (last 10 commits):**"
            echo ""
            if [ -f release-artifacts/sukisu_changelog.txt ]; then
              cat release-artifacts/sukisu_changelog.txt
            else
              echo "*No changelog available*"
            fi
            echo ""
            echo "**Full Commit History:** [Browse all commits](https://github.com/SukiSU-Ultra/SukiSU-Ultra/commits/builtin)"
            echo ""
            echo "---"
            echo "**Checksums:**"
            echo '```'
            cat release-artifacts/checksums.txt
            echo '```'
            } > release_body.md

      - name: Upload All Builds to release repo
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.RELEASE_REPO }}
          name: ${{ env.RELEASE_NAME }}
          tag_name: ${{ env.RELEASE }}
          prerelease: true
          files: |
            release-artifacts/*.zip
            release-artifacts/checksums.txt
            release-artifacts/checksums-md5.txt
          body_path: release_body.md
          
